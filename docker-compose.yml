# docker-compose.yml

services:
  qdrant:
   image: qdrant/qdrant:latest
   ports:
     - "6333:6333"
   volumes:
    - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16
    
    environment:
      POSTGRES_USER: contextcore
      POSTGRES_PASSWORD: contextcore
      POSTGRES_DB: contextcore
      
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: contextcore


volumes:
  mongo_data:
  postgres_data:
  qdrant_data: